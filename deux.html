<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Catalogue HG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">
    <h2 class="section-title">Catalogue des Sortilèges HG</h2>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Rechercher..." onkeyup="searchAnime()">
    </div>
    
    <div class="grid-anime" id="animeGrid">
        
        <div class="anime-card">
            <img src="jujutsukaisen.jpg" alt="Jujutsu Kaisen">
            <div class="card-info">
                <h3>Jujutsu Kaisen</h3>
                <a href="lecteur.html" class="btn-play">▶ Regarder</a>
            </div>
        </div>

        <div class="anime-card">
            <img src="demonslayer.jpg" alt="Demon Slayer">
            <div class="card-info">
                <h3>Demon Slayer</h3>
                <a href="lecteur.html" class="btn-play">▶ Regarder</a>
            </div>
        </div>

    </div>
</main>

<script>
function searchAnime() {
    let input = document.getElementById('searchInput').value.toLowerCase();
    let cards = document.getElementsByClassName('anime-card');
    for (let i = 0; i < cards.length; i++) {
        let title = cards[i].getElementsByTagName('h3')[0].innerText.toLowerCase();
        cards[i].style.display = title.includes(input) ? "" : "none";
    }
}
</script>
</body>
</html>
